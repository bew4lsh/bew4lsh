name: Metrics
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: bew4lsh
          filename: github-languages.svg
          base: ""
          repositories_affiliations: owner
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_other: yes
          extras_css: |
            * { color: #c9d1d9 !important; }
            svg, section, .row, .field { background-color: #0d1117 !important; }
            h2 { color: #c9d1d9 !important; }
            .field { border-color: #30363d !important; }
            text { fill: #c9d1d9 !important; }
