name: Metrics
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Isometric contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: bew4lsh
          filename: github-isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          extras_css: |
            :root { --color-calendar-graph-day-bg: #161b22; --color-calendar-graph-day-border: rgba(27,31,35,0.06); --color-calendar-graph-day-L1-bg: #0e4429; --color-calendar-graph-day-L2-bg: #006d32; --color-calendar-graph-day-L3-bg: #26a641; --color-calendar-graph-day-L4-bg: #39d353; }
            * { color: #c9d1d9 !important; }
            svg, section, .row, .field { background-color: #0d1117 !important; }
            h2, h3 { color: #c9d1d9 !important; }
            .field { border-color: #30363d !important; }
            svg.calendar text, text { fill: #c9d1d9 !important; }

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: bew4lsh
          filename: github-languages.svg
          base: ""
          repositories_affiliations: owner
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_other: yes
          extras_css: |
            :root { --color-calendar-graph-day-bg: #161b22; --color-calendar-graph-day-border: rgba(27,31,35,0.06); --color-calendar-graph-day-L1-bg: #0e4429; --color-calendar-graph-day-L2-bg: #006d32; --color-calendar-graph-day-L3-bg: #26a641; --color-calendar-graph-day-L4-bg: #39d353; }
            * { color: #c9d1d9 !important; }
            svg, section, .row, .field { background-color: #0d1117 !important; }
            h2, h3 { color: #c9d1d9 !important; }
            .field { border-color: #30363d !important; }
            svg.calendar text, text { fill: #c9d1d9 !important; }
